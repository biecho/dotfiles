# ============================================================================
# Tmux Configuration
# ============================================================================
# For remote sessions (SSH + Claude Code) where kitty splits aren't available.
# Keybindings mirror kitty/nvim patterns: prefix+hjkl nav, prefix+\|- splits.

# ----------------------------------------------------------------------------
# Prefix
# ----------------------------------------------------------------------------
# Ctrl+a — no conflict with zsh vi mode (Ctrl+a = home is emacs mode only)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ----------------------------------------------------------------------------
# Terminal & Neovim compatibility
# ----------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
# True color — cover both regular SSH (xterm-256color) and kitten ssh (xterm-kitty)
set -ag terminal-overrides ",xterm-256color:RGB,xterm-kitty:RGB"
# Cursor shape passthrough (beam/block for zsh vi mode and nvim)
set -ag terminal-overrides ",*:Ss=\\E[%p1%d q:Se=\\E[2 q"
# Undercurl support (neovim diagnostics)
set -ag terminal-overrides ",*:Smulx=\\E[4::%p1%dm"
set -ag terminal-overrides ",*:Setulc=\\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"
# Low escape time (so Esc in nvim isn't sluggish)
set -sg escape-time 10
# Focus events (for nvim autoread)
set -g focus-events on

# ----------------------------------------------------------------------------
# Kitty (kitten ssh) integration
# ----------------------------------------------------------------------------
# OSC 52 clipboard: copy inside tmux → local kitty clipboard (via kitten ssh)
set -g set-clipboard on
# Allow kitty escape sequences through tmux (graphics protocol, remote control)
set -g allow-passthrough on

# ----------------------------------------------------------------------------
# General
# ----------------------------------------------------------------------------
setw -g mode-keys vi
set -g mouse on
set -g history-limit 50000
# Start at 1 (matches kitty tab numbering, 0 is far from prefix key)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ----------------------------------------------------------------------------
# Splits (mirrors kitty Cmd+\ and Cmd+-)
# ----------------------------------------------------------------------------
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ----------------------------------------------------------------------------
# Pane navigation (prefix+hjkl — mirrors kitty Ctrl+HJKL)
# ----------------------------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ----------------------------------------------------------------------------
# Pane resize (prefix+HJKL — mirrors kitty Ctrl+Alt+HJKL)
# ----------------------------------------------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ----------------------------------------------------------------------------
# Windows (mirrors kitty tabs)
# ----------------------------------------------------------------------------
bind c new-window -c "#{pane_current_path}"

# Zoom (like kitty Cmd+z toggle_layout stack)
bind z resize-pane -Z

# ----------------------------------------------------------------------------
# Copy mode (vi-style)
# ----------------------------------------------------------------------------
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# ----------------------------------------------------------------------------
# Status bar (inspired by geohot — dark, minimal)
# ----------------------------------------------------------------------------
set -g status-position bottom
set -g status-style "bg=colour234,fg=colour137"
set -g status-left ""
set -g status-right "#[fg=colour233,bg=colour241,bold] #S #[fg=colour233,bg=colour245,bold] %d/%m %H:%M "
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-current-format " #I:#W#F "
setw -g window-status-current-style "fg=colour255,bg=colour241,bold"
setw -g window-status-format " #I:#W#F "
setw -g window-status-style "fg=colour250,bg=colour234"

# Pane borders
set -g pane-active-border-style "fg=colour245"
set -g pane-border-style "fg=colour238"
