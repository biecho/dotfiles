---
dotfiles_install_packages: true
dotfiles_install_vscode: true
dotfiles_install_vscode_extensions: true
dotfiles_install_termusic: true
dotfiles_install_nvim_deps: true
dotfiles_install_claude: true
dotfiles_install_tailscale: true
dotfiles_tailscale_up: true
dotfiles_tailscale_authkey: "{{ lookup('env', 'TAILSCALE_AUTHKEY') }}"
dotfiles_tailscale_hostname: "{{ ansible_facts.hostname }}-ts"
dotfiles_tailscale_up_args: []
dotfiles_set_default_shell: true
