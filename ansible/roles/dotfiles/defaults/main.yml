---
dotfiles_home: "{{ ansible_facts.env.HOME }}"
dotfiles_local_bin: "{{ dotfiles_home }}/.local/bin"
dotfiles_fonts_dir: "{{ dotfiles_home }}/.local/share/fonts"

# For remote SSH hosts, copy this checkout to the target and symlink from there.
dotfiles_sync_to_remote: "{{ (ansible_connection | default('ssh')) != 'local' }}"
dotfiles_repo_strategy: "{{ 'copy' if (dotfiles_sync_to_remote | bool) else 'local' }}"
dotfiles_repo_url: "https://github.com/biecho/dotfiles.git"
dotfiles_repo_version: main
dotfiles_repo_auth: none
dotfiles_remote_dir: "{{ dotfiles_home }}/.dotfiles"
dotfiles_repo_dir: "{{ dotfiles_controller_dir if dotfiles_repo_strategy == 'local' else dotfiles_remote_dir }}"

dotfiles_backup_existing: true
dotfiles_backup_dir: "{{ dotfiles_home }}/.dotfiles_backup/{{ ansible_facts.date_time.iso8601_basic_short }}"

dotfiles_install_packages: true
dotfiles_install_kitty: true
dotfiles_install_vscode: true
dotfiles_install_vscode_extensions: true
dotfiles_install_termusic: true
dotfiles_install_nvim_deps: true
dotfiles_install_claude: true
dotfiles_install_keyd: true
dotfiles_install_tailscale: true
dotfiles_tailscale_up: true
dotfiles_tailscale_authkey: "{{ lookup('env', 'TAILSCALE_AUTHKEY') }}"
dotfiles_tailscale_hostname: "{{ ansible_facts.hostname }}-ts"
dotfiles_tailscale_up_args: []
dotfiles_install_github_cli: "{{ dotfiles_repo_auth == 'remote_gh' }}"

dotfiles_install_homebrew: "{{ dotfiles_install_packages }}"
dotfiles_linux_use_system_packages: "{{ dotfiles_install_packages }}"
dotfiles_linux_package_become: true
dotfiles_set_default_shell: true

dotfiles_common_links:
  - src: zsh/.zshrc
    dest: .zshrc
  - src: starship/starship.toml
    dest: .config/starship.toml
  - src: nvim
    dest: .config/nvim
  - src: git/config
    dest: .gitconfig
  - src: tmux/tmux.conf
    dest: .tmux.conf
  - src: yazi/yazi.toml
    dest: .config/yazi/yazi.toml
  - src: yazi/keymap.toml
    dest: .config/yazi/keymap.toml
  - src: yazi/init.lua
    dest: .config/yazi/init.lua
  - src: yazi/package.toml
    dest: .config/yazi/package.toml
  - src: ideavim/ideavimrc
    dest: .ideavimrc
  - src: .claude/settings.local.json
    dest: .claude/settings.local.json
  - src: .claude/commands
    dest: .claude/commands

dotfiles_kitty_links:
  - src: kitty/themes
    dest: .config/kitty/themes
  - src: kitty/kitty.conf
    dest: .config/kitty/kitty.conf
  - src: kitty/ssh.conf
    dest: .config/kitty/ssh.conf
  - src: kitty/tab_bar.py
    dest: .config/kitty/tab_bar.py
  - src: kitty/choose-files.conf
    dest: .config/kitty/choose-files.conf

dotfiles_macos_links:
  - src: karabiner/karabiner.json
    dest: .config/karabiner/karabiner.json
  - src: lazygit/config.yml
    dest: Library/Application Support/lazygit/config.yml

dotfiles_linux_links:
  - src: lazygit/config.yml
    dest: .config/lazygit/config.yml
  # COSMIC custom keyboard shortcuts (macOS-style Super=Cmd bindings, e.g.
  # Super+Space -> Launcher). COSMIC reads only this overrides file; defaults
  # live in the compositor, so tracking just `custom` is sufficient.
  - src: cosmic/com.system76.CosmicSettings.Shortcuts/v1/custom
    dest: .config/cosmic/com.system76.CosmicSettings.Shortcuts/v1/custom

dotfiles_linux_packages_common:
  - curl
  - fontconfig
  - gh
  - git
  - jq
  - ripgrep
  - rsync
  - tar
  - tmux
  - unzip
  - zsh

# atuin, lazygit, procs, and starship are not in Debian/Ubuntu apt repos; the
# apt fzf is too old for the `fzf --zsh` shell integration; and the apt neovim
# (0.9.x) is too old for the LazyVim config (needs >= 0.11.2). All are installed
# from upstream releases in tools-linux.yml. Arch (rolling) and RedHat get
# neovim from their own package managers below.
dotfiles_linux_packages_debian:
  - bat
  - btop
  - build-essential
  - duf
  - eza
  - fd-find
  - python3-venv
  - zathura
  - zathura-pdf-poppler
  - zoxide

dotfiles_linux_packages_redhat:
  - bat
  - btop
  - fd-find
  - fzf
  - gcc
  - gcc-c++
  - kitty
  - make
  - neovim
  - python3
  - zathura
  - zathura-pdf-poppler

dotfiles_linux_packages_arch:
  - atuin
  - base-devel
  - bat
  - btop
  - duf
  - eza
  - fd
  - fzf
  - kitty
  - lazygit
  - neovim
  - procs
  - python
  - starship
  - zathura
  - zathura-pdf-poppler
  - zoxide

dotfiles_vscode_extensions_file: "{{ dotfiles_repo_dir }}/vscode/extensions.txt"
