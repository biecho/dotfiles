---
- name: Validate supported platform
  ansible.builtin.assert:
    that:
      - ansible_facts.system in ["Darwin", "Linux"]
    fail_msg: "This dotfiles role supports macOS and Linux targets."

- name: Build platform link list
  ansible.builtin.set_fact:
    dotfiles_links: >-
      {{
        dotfiles_common_links
        + dotfiles_kitty_links
        + (dotfiles_macos_links if ansible_facts.system == "Darwin" else dotfiles_linux_links)
      }}

- name: Prepare repository on target
  ansible.builtin.include_tasks: repository.yml

- name: Install macOS packages
  ansible.builtin.include_tasks: packages-macos.yml
  when:
    - ansible_facts.system == "Darwin"
    - dotfiles_install_packages | bool

- name: Install Linux packages
  ansible.builtin.include_tasks: packages-linux.yml
  when:
    - ansible_facts.system == "Linux"
    - dotfiles_install_packages | bool

- name: Set default shell
  ansible.builtin.include_tasks: shell.yml
  when: dotfiles_set_default_shell | bool

- name: Configure keyd key remapping
  ansible.builtin.include_tasks: keyd.yml
  when:
    - ansible_facts.system == "Linux"
    - dotfiles_install_keyd | bool

- name: Configure Tailscale
  ansible.builtin.include_tasks: tailscale.yml
  when: dotfiles_install_tailscale | bool

- name: Ensure GitHub CLI is available
  ansible.builtin.include_tasks: github-cli.yml
  when:
    - dotfiles_repo_auth == "remote_gh"
    - dotfiles_repo_strategy == "git"

- name: Configure remote GitHub credentials
  ansible.builtin.include_tasks: github-auth.yml
  when:
    - dotfiles_repo_auth == "remote_gh"
    - dotfiles_repo_strategy == "git"

- name: Install kitty terminal and Nerd Font
  ansible.builtin.include_tasks: kitty.yml
  when:
    - ansible_facts.system == "Linux"
    - dotfiles_install_kitty | bool

- name: Create dotfile symlinks
  ansible.builtin.include_tasks: symlinks.yml

- name: Configure Neovim plugin dependencies
  ansible.builtin.include_tasks: nvim.yml
  when: dotfiles_install_nvim_deps | bool

- name: Configure VSCode
  ansible.builtin.include_tasks: vscode.yml
  when: dotfiles_install_vscode | bool

- name: Configure Termusic
  ansible.builtin.include_tasks: termusic.yml
  when: dotfiles_install_termusic | bool

- name: Install Anki
  ansible.builtin.include_tasks: anki.yml
  when:
    - ansible_facts.system == "Linux"
    - dotfiles_install_anki | bool

- name: Install Claude Code
  ansible.builtin.include_tasks: claude.yml
  when: dotfiles_install_claude | bool
