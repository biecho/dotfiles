---
- name: Select Linux package list
  ansible.builtin.set_fact:
    dotfiles_linux_packages: >-
      {{
        dotfiles_linux_packages_common
        + (dotfiles_linux_packages_debian if ansible_facts.os_family == "Debian" else [])
        + (dotfiles_linux_packages_redhat if ansible_facts.os_family == "RedHat" else [])
        + (dotfiles_linux_packages_arch if ansible_facts.os_family == "Archlinux" else [])
      }}

- name: Refresh apt metadata on Debian-family systems
  ansible.builtin.apt:
    update_cache: true
  become: "{{ dotfiles_linux_package_become | bool }}"
  when:
    - dotfiles_linux_use_system_packages | bool
    - ansible_facts.os_family == "Debian"

- name: Install Linux packages with system package manager
  ansible.builtin.package:
    name: "{{ dotfiles_linux_packages }}"
    state: present
  become: "{{ dotfiles_linux_package_become | bool }}"
  when: dotfiles_linux_use_system_packages | bool

- name: Ensure local bin directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_local_bin }}"
    state: directory
    mode: "0755"

- name: Check Debian fd executable
  ansible.builtin.stat:
    path: /usr/bin/fdfind
  register: dotfiles_fdfind
  when: ansible_facts.os_family == "Debian"

- name: Link Debian fd executable name
  ansible.builtin.file:
    src: /usr/bin/fdfind
    dest: "{{ dotfiles_local_bin }}/fd"
    state: link
  when:
    - ansible_facts.os_family == "Debian"
    - dotfiles_fdfind.stat.exists

- name: Check Debian bat executable
  ansible.builtin.stat:
    path: /usr/bin/batcat
  register: dotfiles_batcat
  when: ansible_facts.os_family == "Debian"

- name: Link Debian bat executable name
  ansible.builtin.file:
    src: /usr/bin/batcat
    dest: "{{ dotfiles_local_bin }}/bat"
    state: link
  when:
    - ansible_facts.os_family == "Debian"
    - dotfiles_batcat.stat.exists

- name: Install Debian tools not available in apt
  ansible.builtin.include_tasks: tools-linux.yml
  when:
    - dotfiles_linux_use_system_packages | bool
    - ansible_facts.os_family == "Debian"

- name: Warn when Linux package installation is disabled
  ansible.builtin.debug:
    msg: "Linux package installation is disabled; only dotfile links will be managed."
  when: not (dotfiles_linux_use_system_packages | bool)
